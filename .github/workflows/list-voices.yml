name: List voices (ElevenLabs)
on:
  workflow_dispatch:
    inputs:
      lang:
        description: Language code (es / en)
        required: false
        default: es
jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: List voices
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          VLANG: ${{ inputs.lang }}
        run: node scripts/list-voices.mjs
