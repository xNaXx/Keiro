name: Generate meditations (ElevenLabs)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Generate audio with ElevenLabs
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: node scripts/gen-meditations.mjs
      - name: Commit generated audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/meditations
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Audios pregenerados de ElevenLabs (Lúa y Mateo)"
            git push origin main
          fi
