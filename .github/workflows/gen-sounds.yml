name: Generate ambient sounds (Freesound)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Download & loop ambient sounds
        env:
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
        run: node scripts/gen-sounds.mjs
      - name: Commit sounds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/sounds
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Loops ambientales CC0 de Freesound (sin corte)"
            git push origin main
          fi
